<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Query }} - Brave News Search</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="results-header">
        <a href="/" class="home-button">Home</a>
        <form id="search-form" action="/news" method="get">
            <input type="text" name="q" value="{{ .Query }}" required>
            <button type="submit">Search</button>
        </form>
        <div class="search-type-toggle">
            <a href="/search?q={{ .Query }}&amp;mode=web" class="tab-btn">Web</a>
            <a href="/search?q={{ .Query }}&amp;mode=rich" class="tab-btn">Web+</a>
            <span class="tab-btn active">News</span>
        </div>
    </header>

    <main style="margin-top: 2rem;">
        {{ if .Results }}
            {{ range .Results }}
                <article class="news-result">
                    <h3><a href="{{ .URL }}">{{ .Title }}</a></h3>
                    <p class="meta">{{ .Source }} &middot; {{ .Age }}</p>
                    <p class="result-description">{{ .Description }}</p>
                </article>
            {{ end }}
        {{ else }}
            <p>No news results found for "{{ .Query }}".</p>
        {{ end }}
    </main>
</body>
</html>
